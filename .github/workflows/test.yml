name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32 # v5.0.2
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test -v ./...
      - run: go build .

  integration:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://alertchain:alertchain@localhost:5432/alertchain_test?sslmode=disable
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: alertchain
          POSTGRES_PASSWORD: alertchain
          POSTGRES_DB: alertchain_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32 # v5.0.2
        with:
          go-version-file: go.mod
      - name: Install migrate
        run: go install -tags postgres github.com/golang-migrate/migrate/v4/cmd/migrate@v4.18.1
      - name: Apply migrations
        run: migrate -path ./migrations -database "$DATABASE_URL" up
      - run: go test -v ./...
