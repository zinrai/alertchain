name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test -v ./...
      - run: go build ./cmd/alertchain

  integration:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://alertchain:alertchain@localhost:5432/alertchain_test?sslmode=disable
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: alertchain
          POSTGRES_PASSWORD: alertchain
          POSTGRES_DB: alertchain_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - name: Install migrate
        run: go install -tags postgres github.com/golang-migrate/migrate/v4/cmd/migrate@v4.18.1
      - name: Apply migrations
        run: migrate -path ./migrations -database "$DATABASE_URL" up
      - run: go test -v ./...
